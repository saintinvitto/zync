<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="../assets/js/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>
<body>

<a href="../../index.html" class="auth-back" data-i18n="auth.voltarSite">← Voltar para o site</a>

<div class="auth-screen">
  <div class="auth-orb"></div>

  <div class="auth-card">
    <div class="auth-logo"><svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4D8DFF"/><stop offset="100%" stop-color="#0055FE"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#logoGrad)"/><path d="M9 10 H23 V13.5 L13.5 19 H23 V22 H9 V18.5 L18.5 13 H9 Z" fill="#fff"/></svg><span>Zync</span></div>
    <div class="auth-title" data-i18n="auth.bemVindoDeVolta">Bem-vindo de volta</div>
    <div class="auth-sub" data-i18n="auth.entrarSub">Entre para acessar seu painel de leads e conversas.</div>

    <div class="auth-alert" id="alert"></div>

    <form class="auth-form" id="login-form" novalidate>
      <div class="field">
        <label for="email" data-i18n="auth.email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="voce@empresa.com" required autocomplete="email">
      </div>

      <div class="field">
        <label for="senha" data-i18n="auth.senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password">
        <div style="text-align:right; margin-top:0.5rem;">
          <a href="esqueci-senha.html" style="color:var(--azul-claro); font-size:0.82rem; text-decoration:none;" data-i18n="auth.esqueciSenha">Esqueci minha senha</a>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
        <span id="submit-label" data-i18n="auth.entrar">Entrar</span>
      </button>
    </form>

    <div class="auth-foot">
      <span data-i18n="auth.semConta">Ainda não tem conta?</span> <a href="registro.html" data-i18n="auth.criarConta">Criar conta</a>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
  Auth.redirectIfAuthenticated();
  Lang.aplicar();

  const form = document.getElementById('login-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');
  const submitLabel = document.getElementById('submit-label');

  function setLoading(loading) {
    submitBtn.disabled = loading;
    submitLabel.innerHTML = loading ? '<span class="spinner"></span>' : Lang.t('auth.entrar');
  }

  function showAlert(message) {
    alertBox.textContent = message;
    alertBox.classList.add('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.classList.remove('visible');

    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    setLoading(true);
    try {
      const { token, usuario } = await Api.login(email, senha);
      Auth.setSession(token, usuario);
      window.location.href = Auth.destinoPosLogin();
    } catch (err) {
      showAlert(err.message);
      setLoading(false);
    }
  });
</script>

</body>
</html>

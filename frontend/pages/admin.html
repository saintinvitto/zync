<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-logo"><span>Zync</span></div>

    <nav class="sidebar-nav">
      <a href="admin.html" class="sidebar-item active" data-icon="settings"> Admin do SaaS</a>
      <a href="dashboard.html" class="sidebar-item" data-icon="clipboardList"> Minha conta (cliente)</a>
      <a href="perfil.html" class="sidebar-item" data-icon="user"> Perfil</a>
      <a href="suporte.html" class="sidebar-item" data-icon="messageCircle"> Suporte</a>
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar" id="user-avatar">--</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="user-name">—</div>
        <div class="sidebar-user-email" id="user-email">—</div>
      </div>
      <button class="sidebar-logout" id="logout-btn" title="Sair" data-icon="logOut"></button>
    </div>
  </aside>

  <main class="app-main">
    <div class="app-topbar">
      <div>
        <div class="app-title">Painel administrativo do Zync</div>
        <div class="app-title-sub">Visível só pra quem fundou isso.</div>
      </div>
    </div>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="building"></div>
          <div class="stat-label">Empresas</div>
          <button class="stat-kebab" aria-label="Mais opções" type="button" data-icon="moreHorizontal"></button>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="adm-total-usuarios"><span class="skeleton" style="width:40px;height:1.8rem;"></span></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="dollarSign"></div>
          <div class="stat-label">MRR</div>
          <button class="stat-kebab" aria-label="Mais opções" type="button" data-icon="moreHorizontal"></button>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="adm-mrr"><span class="skeleton" style="width:60px;height:1.8rem;"></span></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="checkCircle"></div>
          <div class="stat-label">Assinaturas ativas</div>
          <button class="stat-kebab" aria-label="Mais opções" type="button" data-icon="moreHorizontal"></button>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="adm-ativas"><span class="skeleton" style="width:40px;height:1.8rem;"></span></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="clock"></div>
          <div class="stat-label">Pend. / canceladas</div>
          <button class="stat-kebab" aria-label="Mais opções" type="button" data-icon="moreHorizontal"></button>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="adm-pendentes"><span class="skeleton" style="width:40px;height:1.8rem;"></span></div></div>
      </div>
    </section>

    <div class="kanban-header">
      <div class="app-title" style="font-size:1.15rem;">Empresas cadastradas</div>
      <button class="btn btn-ghost btn-sm" id="refresh-admin" data-icon="refreshCw"> Atualizar</button>
    </div>
    <div class="agenda-list" id="admin-users-list">
      <div class="empty-state"><span class="spinner"></span></div>
    </div>

    <div class="kanban-header" style="margin-top:2.2rem;">
      <div class="app-title" style="font-size:1.15rem;">Planos</div>
      <button class="btn btn-primary btn-sm" id="open-new-plano">+ Novo plano</button>
    </div>
    <div class="agenda-list" id="admin-planos-list">
      <div class="empty-state"><span class="spinner"></span></div>
    </div>

    <div class="kanban-header" style="margin-top:2.2rem;">
      <div class="app-title" style="font-size:1.15rem;">Mensagens de suporte</div>
    </div>
    <div class="agenda-list" id="admin-suporte-list">
      <div class="empty-state"><span class="spinner"></span></div>
    </div>
  </main>
</div>

<!-- Modal: novo / editar plano -->
<div class="modal-overlay" id="plano-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="plano-modal-title">Novo plano</div>
      <button class="modal-close" data-close-modal aria-label="Fechar" data-icon="x"></button>
    </div>

    <form id="plano-form" novalidate>
      <input type="hidden" id="pl-id">
      <div class="field">
        <label for="pl-nome">Nome</label>
        <input type="text" id="pl-nome" placeholder="Ex: Pro Mensal" required>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="pl-preco">Preço (R$)</label>
          <input type="number" id="pl-preco" min="0" step="0.01" required>
        </div>
        <div class="field">
          <label for="pl-intervalo">Intervalo (dias)</label>
          <input type="number" id="pl-intervalo" min="1" step="1" value="30" required>
        </div>
      </div>
      <div class="field" id="pl-ativo-field" style="display:none;">
        <label for="pl-ativo">Status</label>
        <select id="pl-ativo">
          <option value="1">Ativo</option>
          <option value="0">Inativo</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" data-close-modal>Cancelar</button>
        <button type="submit" class="btn btn-primary" id="plano-submit"><span id="plano-submit-label">Salvar</span></button>
      </div>
    </form>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/icons.js"></script>
<script src="../assets/js/app-shell.js"></script>
<script src="../assets/js/admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="../assets/js/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Início — Admin Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>

<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-logo"><span>Zync</span></div>

    <nav class="sidebar-nav">
      <a href="admin.html" class="sidebar-item active" data-icon="dashboard"> <span data-i18n="nav.inicio">Início</span></a>
      <a href="admin-produtos.html" class="sidebar-item" data-icon="tag"> <span data-i18n="nav.produtos">Produtos</span></a>
      <a href="admin-analises.html" class="sidebar-item" data-icon="trendingUp"> <span data-i18n="nav.analises">Análises</span></a>
      <a href="admin-clientes.html" class="sidebar-item" data-icon="building"> <span data-i18n="nav.clientes">Clientes</span></a>
      <a href="admin-afiliados.html" class="sidebar-item" data-icon="link2"> <span data-i18n="nav.afiliados">Afiliados</span></a>
      <a href="admin-conversoes.html" class="sidebar-item" data-icon="barChart"> <span data-i18n="nav.conversoes">Conversões</span></a>

      <div class="sidebar-divider"></div>

      <a href="dashboard.html" class="sidebar-item" data-icon="clipboardList"> <span data-i18n="nav.minhaConta">Minha conta (cliente)</span></a>
      <a href="configuracoes.html" class="sidebar-item" data-icon="settings"> <span data-i18n="nav.configuracoes">Configurações</span></a>
      <a href="suporte.html" class="sidebar-item" data-icon="messageCircle"> <span data-i18n="nav.suporte">Suporte</span></a>
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar" id="user-avatar">--</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="user-name">—</div>
        <div class="sidebar-user-email" id="user-email">—</div>
      </div>
      <button class="sidebar-logout" id="logout-btn" title="Sair" data-icon="logOut"></button>
    </div>
  </aside>

  <main class="app-main">
    <div class="app-topbar">
      <div>
        <div class="app-title">Início — painel administrativo</div>
        <div class="app-title-sub">Visível só pra quem fundou isso.</div>
      </div>
      <button class="btn btn-ghost btn-sm" id="refresh-admin" data-icon="refreshCw"> Atualizar</button>
    </div>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="building"></div>
          <div class="stat-label">Empresas</div>
          <button class="stat-kebab" aria-label="Mais opções" type="button" data-icon="moreHorizontal"></button>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="adm-total-usuarios"><span class="skeleton" style="width:40px;height:1.8rem;"></span></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="dollarSign"></div>
          <div class="stat-label">MRR</div>
          <button class="stat-kebab" aria-label="Mais opções" type="button" data-icon="moreHorizontal"></button>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="adm-mrr"><span class="skeleton" style="width:60px;height:1.8rem;"></span></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="checkCircle"></div>
          <div class="stat-label">Assinaturas ativas</div>
          <button class="stat-kebab" aria-label="Mais opções" type="button" data-icon="moreHorizontal"></button>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="adm-ativas"><span class="skeleton" style="width:40px;height:1.8rem;"></span></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="clock"></div>
          <div class="stat-label">Pend. / canceladas</div>
          <button class="stat-kebab" aria-label="Mais opções" type="button" data-icon="moreHorizontal"></button>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="adm-pendentes"><span class="skeleton" style="width:40px;height:1.8rem;"></span></div></div>
      </div>
    </section>
  </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/icons.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/app-shell.js"></script>
<script src="../assets/js/admin.js"></script>

</body>
</html>

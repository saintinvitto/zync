<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esqueci minha senha — Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>

<a href="../../index.html" class="auth-back">← Voltar para o site</a>

<div class="auth-screen">
  <div class="auth-orb"></div>

  <div class="auth-card">
    <div class="auth-logo"><span>Zync</span></div>
    <div class="auth-title">Esqueceu sua senha?</div>
    <div class="auth-sub">Digite seu e-mail e enviaremos um link para redefinir a senha.</div>

    <div class="auth-alert" id="alert"></div>

    <form class="auth-form" id="esqueci-form" novalidate>
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="voce@empresa.com" required autocomplete="email">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
        <span id="submit-label">Enviar link de redefinição</span>
      </button>
    </form>

    <div class="auth-foot">
      <a href="login.html">← Voltar para o login</a>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
  Auth.redirectIfAuthenticated();

  const form = document.getElementById('esqueci-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');
  const submitLabel = document.getElementById('submit-label');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.className = 'auth-alert';

    const email = document.getElementById('email').value.trim();

    submitBtn.disabled = true;
    submitLabel.innerHTML = '<span class="spinner"></span>';

    try {
      const { mensagem } = await Api.auth.esqueciSenha(email);
      alertBox.textContent = mensagem;
      alertBox.classList.add('visible', 'success');
      form.reset();
    } catch (err) {
      alertBox.textContent = err.message;
      alertBox.classList.add('visible');
    } finally {
      submitBtn.disabled = false;
      submitLabel.textContent = 'Enviar link de redefinição';
    }
  });
</script>

</body>
</html>

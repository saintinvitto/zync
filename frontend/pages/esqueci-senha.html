<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="../assets/js/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esqueci minha senha — Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>
<body>

<a href="../../index.html" class="auth-back" data-i18n="auth.voltarSite">← Voltar para o site</a>

<div class="auth-screen">
  <div class="auth-orb"></div>

  <div class="auth-card">
    <div class="auth-logo"><svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4D8DFF"/><stop offset="100%" stop-color="#0055FE"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#logoGrad)"/><path d="M9 10 H23 V13.5 L13.5 19 H23 V22 H9 V18.5 L18.5 13 H9 Z" fill="#fff"/></svg><span>Zync</span></div>
    <div class="auth-title" data-i18n="auth.esqueceuSenha">Esqueceu sua senha?</div>
    <div class="auth-sub" data-i18n="auth.esqueciSenhaSub">Digite seu e-mail e enviaremos um link para redefinir a senha.</div>

    <div class="auth-alert" id="alert"></div>

    <form class="auth-form" id="esqueci-form" novalidate>
      <div class="field">
        <label for="email" data-i18n="auth.email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="voce@empresa.com" required autocomplete="email">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
        <span id="submit-label" data-i18n="auth.enviarLink">Enviar link de redefinição</span>
      </button>
    </form>

    <div class="auth-foot">
      <a href="login.html" data-i18n="auth.voltarLogin">← Voltar para o login</a>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
  Auth.redirectIfAuthenticated();
  Lang.aplicar();

  const form = document.getElementById('esqueci-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');
  const submitLabel = document.getElementById('submit-label');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.className = 'auth-alert';

    const email = document.getElementById('email').value.trim();

    submitBtn.disabled = true;
    submitLabel.innerHTML = '<span class="spinner"></span>';

    try {
      const { mensagem } = await Api.auth.esqueciSenha(email);
      alertBox.textContent = mensagem;
      alertBox.classList.add('visible', 'success');
      form.reset();
    } catch (err) {
      alertBox.textContent = err.message;
      alertBox.classList.add('visible');
    } finally {
      submitBtn.disabled = false;
      submitLabel.textContent = Lang.t('auth.enviarLink');
    }
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="../assets/js/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir senha — Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>
<body>

<a href="../../index.html" class="auth-back" data-i18n="auth.voltarSite">← Voltar para o site</a>

<div class="auth-screen">
  <div class="auth-orb"></div>

  <div class="auth-card">
    <div class="auth-logo"><svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4D8DFF"/><stop offset="100%" stop-color="#0055FE"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#logoGrad)"/><path d="M9 10 H23 V13.5 L13.5 19 H23 V22 H9 V18.5 L18.5 13 H9 Z" fill="#fff"/></svg><span>Zync</span></div>
    <div class="auth-title" data-i18n="auth.criarNovaSenha">Crie uma nova senha</div>
    <div class="auth-sub" data-i18n="auth.linkValido1h">O link de redefinição é válido por 1 hora.</div>

    <div class="auth-alert" id="alert"></div>

    <form class="auth-form" id="redefinir-form" novalidate>
      <div class="field">
        <label for="senha" data-i18n="auth.novaSenha">Nova senha</label>
        <input type="password" id="senha" placeholder="Mínimo 8 caracteres, com letras e números" minlength="8" required autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirmar" data-i18n="auth.confirmarNovaSenha">Confirmar nova senha</label>
        <input type="password" id="confirmar" placeholder="Repita a senha" minlength="8" required autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
        <span id="submit-label" data-i18n="auth.redefinirSenha">Redefinir senha</span>
      </button>
    </form>

    <div class="auth-foot" id="foot-links">
      <a href="login.html" data-i18n="auth.voltarLogin">← Voltar para o login</a>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
  Lang.aplicar();

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  const form = document.getElementById('redefinir-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');
  const submitLabel = document.getElementById('submit-label');

  if (!token) {
    form.classList.add('hidden');
    alertBox.textContent = Lang.t('auth.linkInvalido');
    alertBox.classList.add('visible');
    document.getElementById('foot-links').innerHTML = `<a href="esqueci-senha.html">${Lang.t('auth.solicitarNovoLink')}</a>`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.className = 'auth-alert';

    const senha = document.getElementById('senha').value;
    const confirmar = document.getElementById('confirmar').value;

    if (senha !== confirmar) {
      alertBox.textContent = Lang.t('auth.senhasNaoCoincidem');
      alertBox.classList.add('visible');
      return;
    }

    submitBtn.disabled = true;
    submitLabel.innerHTML = '<span class="spinner"></span>';

    try {
      await Api.auth.redefinirSenha(token, senha);
      form.classList.add('hidden');
      alertBox.textContent = Lang.t('auth.senhaRedefinidaSucesso');
      alertBox.classList.add('visible', 'success');
      document.getElementById('foot-links').innerHTML = `<a href="login.html">${Lang.t('auth.irParaLogin')}</a>`;
    } catch (err) {
      alertBox.textContent = err.message;
      alertBox.classList.add('visible');
      submitBtn.disabled = false;
      submitLabel.textContent = Lang.t('auth.redefinirSenha');
    }
  });
</script>

</body>
</html>

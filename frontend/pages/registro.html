<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta — Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>

<a href="../../index.html" class="auth-back">← Voltar para o site</a>

<div class="auth-screen">
  <div class="auth-orb"></div>

  <div class="auth-card">
    <div class="auth-logo"><span>Zync</span></div>
    <div class="auth-title">Crie sua conta grátis</div>
    <div class="auth-sub">Comece a transformar conversas em clientes em minutos.</div>

    <div class="auth-alert" id="alert"></div>

    <form class="auth-form" id="registro-form" novalidate>
      <div class="field">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Seu nome" required autocomplete="name">
      </div>

      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="voce@empresa.com" required autocomplete="email">
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
        <span id="submit-label">Criar conta grátis</span>
      </button>
    </form>

    <div class="auth-foot">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
  Auth.redirectIfAuthenticated();

  const form = document.getElementById('registro-form');
  const alertBox = document.getElementById('alert');
  const submitBtn = document.getElementById('submit-btn');
  const submitLabel = document.getElementById('submit-label');

  function setLoading(loading) {
    submitBtn.disabled = loading;
    submitLabel.innerHTML = loading ? '<span class="spinner"></span>' : 'Criar conta grátis';
  }

  function showAlert(message, type = 'error') {
    alertBox.textContent = message;
    alertBox.className = `auth-alert visible ${type === 'success' ? 'success' : ''}`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertBox.classList.remove('visible');

    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    if (senha.length < 6) {
      showAlert('A senha precisa ter no mínimo 6 caracteres.');
      return;
    }

    setLoading(true);
    try {
      await Api.register(nome, email, senha);
      const { token, usuario } = await Api.login(email, senha);
      Auth.setSession(token, usuario);
      window.location.href = Auth.destinoPosLogin();
    } catch (err) {
      showAlert(err.message);
      setLoading(false);
    }
  });
</script>

</body>
</html>

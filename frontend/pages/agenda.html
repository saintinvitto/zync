<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="../assets/js/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>
<body>
<canvas class="waves-bg" id="wavesBg"></canvas>

<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-logo"><svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4D8DFF"/><stop offset="100%" stop-color="#0055FE"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#logoGrad)"/><path d="M9 10 H23 V13.5 L13.5 19 H23 V22 H9 V18.5 L18.5 13 H9 Z" fill="#fff"/></svg><span>Zync</span></div>

    <nav class="sidebar-nav">
      <a href="dashboard.html#stats" class="sidebar-item" data-icon="dashboard"> <span data-i18n="nav.visaoGeral">Visão geral</span></a>
      <a href="dashboard.html#analises" class="sidebar-item" data-icon="trendingUp"> <span data-i18n="nav.analises">Análises</span></a>
      <a href="dashboard.html#kanban" class="sidebar-item" data-icon="users"> <span data-i18n="nav.leads">Leads</span></a>
      <a href="agenda.html" class="sidebar-item active" data-icon="calendar"> <span data-i18n="nav.agenda">Agenda</span></a>
      <a href="catalogo.html" class="sidebar-item" data-icon="tag"> <span data-i18n="nav.catalogo">Catálogo</span></a>

      <div class="sidebar-divider"></div>

      <a href="configuracoes.html" class="sidebar-item" data-icon="settings"> <span data-i18n="nav.configuracoes">Configurações</span></a>
      <a href="suporte.html" class="sidebar-item" data-icon="messageCircle"> <span data-i18n="nav.suporte">Suporte</span></a>
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar" id="user-avatar">--</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="user-name">—</div>
        <div class="sidebar-user-email" id="user-email">—</div>
      </div>
      <button class="sidebar-logout" id="logout-btn" title="Sair" data-icon="logOut"></button>
    </div>
  </aside>

  <main class="app-main">
    <div class="app-topbar">
      <div>
        <div class="app-title">Agenda</div>
        <div class="app-title-sub">Todos os agendamentos, de todos os leads, em ordem.</div>
      </div>
      <button class="btn btn-primary" id="open-new-agendamento">+ Novo agendamento</button>
    </div>

    <div class="agenda-list" id="agenda-list">
      <div class="empty-state">
        <div class="empty-state-icon" data-icon="calendar" data-icon-size="36"></div>
        <div><span class="spinner"></span></div>
      </div>
    </div>
  </main>
</div>

<!-- Modal: novo agendamento -->
<div class="modal-overlay" id="agendamento-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Novo agendamento</div>
      <button class="modal-close" data-close-modal aria-label="Fechar" data-icon="x"></button>
    </div>

    <form id="new-agendamento-form" novalidate>
      <div class="field">
        <label for="ag-lead">Lead *</label>
        <select id="ag-lead" required>
          <option value="">Selecione um lead…</option>
        </select>
      </div>

      <div class="field">
        <label for="ag-servico">Serviço</label>
        <input type="text" id="ag-servico" placeholder="Ex: Avaliação inicial">
      </div>

      <div class="field">
        <label for="ag-data">Data e hora *</label>
        <input type="datetime-local" id="ag-data" required>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" data-close-modal>Cancelar</button>
        <button type="submit" class="btn btn-primary" id="ag-submit"><span id="ag-submit-label">Agendar</span></button>
      </div>
    </form>
  </div>
</div>

<script src="../assets/js/waves-bg.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/icons.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/app-shell.js"></script>
<script src="../assets/js/agenda.js"></script>

</body>
</html>

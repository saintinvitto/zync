<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="../assets/js/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes — Admin Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>
<body>
<canvas class="waves-bg" id="wavesBg"></canvas>

<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-logo"><svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4D8DFF"/><stop offset="100%" stop-color="#0055FE"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#logoGrad)"/><path d="M9 10 H23 V13.5 L13.5 19 H23 V22 H9 V18.5 L18.5 13 H9 Z" fill="#fff"/></svg><span>Zync</span></div>

    <nav class="sidebar-nav">
      <a href="admin.html" class="sidebar-item" data-icon="dashboard"> <span data-i18n="nav.inicio">Início</span></a>
      <a href="admin-produtos.html" class="sidebar-item" data-icon="tag"> <span data-i18n="nav.produtos">Produtos</span></a>
      <a href="admin-analises.html" class="sidebar-item" data-icon="trendingUp"> <span data-i18n="nav.analises">Análises</span></a>
      <a href="admin-clientes.html" class="sidebar-item active" data-icon="building"> <span data-i18n="nav.clientes">Clientes</span></a>
      <a href="admin-afiliados.html" class="sidebar-item" data-icon="link2"> <span data-i18n="nav.afiliados">Afiliados</span></a>
      <a href="admin-conversoes.html" class="sidebar-item" data-icon="barChart"> <span data-i18n="nav.conversoes">Conversões</span></a>

      <div class="sidebar-divider"></div>

      <a href="dashboard.html" class="sidebar-item" data-icon="clipboardList"> <span data-i18n="nav.minhaConta">Minha conta (cliente)</span></a>
      <a href="configuracoes.html" class="sidebar-item" data-icon="settings"> <span data-i18n="nav.configuracoes">Configurações</span></a>
      <a href="suporte.html" class="sidebar-item" data-icon="messageCircle"> <span data-i18n="nav.suporte">Suporte</span></a>
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar" id="user-avatar">--</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="user-name">—</div>
        <div class="sidebar-user-email" id="user-email">—</div>
      </div>
      <button class="sidebar-logout" id="logout-btn" title="Sair" data-icon="logOut"></button>
    </div>
  </aside>

  <main class="app-main">
    <div class="app-topbar">
      <div>
        <div class="app-title">Clientes</div>
        <div class="app-title-sub">Empresas cadastradas no Zync e mensagens de suporte abertas por elas.</div>
      </div>
      <button class="btn btn-ghost btn-sm" id="refresh-admin" data-icon="refreshCw"> Atualizar</button>
    </div>

    <div class="kanban-header">
      <div class="app-title" style="font-size:1.15rem;">Empresas cadastradas</div>
      <label style="display:flex; align-items:center; gap:0.5rem; font-size:0.82rem; color:var(--cinza); font-weight:400;">
        <input type="checkbox" id="mostrar-removidas">
        Mostrar empresas removidas
      </label>
    </div>
    <div class="agenda-list" id="admin-users-list">
      <div class="empty-state"><span class="spinner"></span></div>
    </div>

    <div class="kanban-header" style="margin-top:2.2rem;">
      <div class="app-title" style="font-size:1.15rem;">Mensagens de suporte</div>
    </div>
    <div class="agenda-list" id="admin-suporte-list">
      <div class="empty-state"><span class="spinner"></span></div>
    </div>
  </main>
</div>

<!-- Modal: detalhes da assinatura -->
<div class="modal-overlay" id="detalhes-modal">
  <div class="modal-box" style="max-width: 420px;">
    <div class="modal-header">
      <div class="modal-title">Detalhes da assinatura</div>
      <button class="modal-close" data-close-modal aria-label="Fechar" data-icon="x"></button>
    </div>

    <div id="detalhes-conteudo" style="display:flex; flex-direction:column; gap:0.7rem; font-size:0.88rem;"></div>

    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" data-close-modal>Fechar</button>
    </div>
  </div>
</div>

<script src="../assets/js/waves-bg.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/icons.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/app-shell.js"></script>
<script src="../assets/js/admin-clientes.js"></script>

</body>
</html>

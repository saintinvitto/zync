<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="../assets/js/theme.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversões — Admin Zync</title>
<link rel="stylesheet" href="../assets/css/app.css">
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>
<body>
<canvas class="waves-bg" id="wavesBg"></canvas>

<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-logo"><svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4D8DFF"/><stop offset="100%" stop-color="#0055FE"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#logoGrad)"/><path d="M9 10 H23 V13.5 L13.5 19 H23 V22 H9 V18.5 L18.5 13 H9 Z" fill="#fff"/></svg><span>Zync</span></div>

    <nav class="sidebar-nav">
      <a href="admin.html" class="sidebar-item" data-icon="dashboard"> <span data-i18n="nav.inicio">Início</span></a>
      <a href="admin-produtos.html" class="sidebar-item" data-icon="tag"> <span data-i18n="nav.produtos">Produtos</span></a>
      <a href="admin-analises.html" class="sidebar-item" data-icon="trendingUp"> <span data-i18n="nav.analises">Análises</span></a>
      <a href="admin-clientes.html" class="sidebar-item" data-icon="building"> <span data-i18n="nav.clientes">Clientes</span></a>
      <a href="admin-afiliados.html" class="sidebar-item" data-icon="link2"> <span data-i18n="nav.afiliados">Afiliados</span></a>
      <a href="admin-conversoes.html" class="sidebar-item active" data-icon="barChart"> <span data-i18n="nav.conversoes">Conversões</span></a>

      <div class="sidebar-divider"></div>

      <a href="dashboard.html" class="sidebar-item" data-icon="clipboardList"> <span data-i18n="nav.minhaConta">Minha conta (cliente)</span></a>
      <a href="configuracoes.html" class="sidebar-item" data-icon="settings"> <span data-i18n="nav.configuracoes">Configurações</span></a>
      <a href="suporte.html" class="sidebar-item" data-icon="messageCircle"> <span data-i18n="nav.suporte">Suporte</span></a>
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-avatar" id="user-avatar">--</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="user-name">—</div>
        <div class="sidebar-user-email" id="user-email">—</div>
      </div>
      <button class="sidebar-logout" id="logout-btn" title="Sair" data-icon="logOut"></button>
    </div>
  </aside>

  <main class="app-main">
    <div class="app-topbar">
      <div>
        <div class="app-title">Conversões</div>
        <div class="app-title-sub">Funil de vendas do Zync como negócio.</div>
      </div>
    </div>

    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="building"></div>
          <div class="stat-label">Cadastros totais</div>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="conv-total"><span class="skeleton" style="width:40px;height:1.8rem;"></span></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="checkCircle"></div>
          <div class="stat-label">Taxa de conversão (cadastro → pagante)</div>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="conv-taxa"><span class="skeleton" style="width:50px;height:1.8rem;"></span></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-icon" data-icon="dollarSign"></div>
          <div class="stat-label">Assinaturas ativas</div>
        </div>
        <div class="stat-num-row"><div class="stat-num" id="conv-ativas"><span class="skeleton" style="width:40px;height:1.8rem;"></span></div></div>
      </div>
    </section>

    <section class="analytics-side" style="display:flex; gap:1.4rem; flex-wrap:wrap;">
      <div class="chart-card" style="flex:1; min-width:300px;">
        <div class="chart-card-header">
          <div class="chart-title">Funil: cadastro → checkout → pagante</div>
        </div>
        <div class="barlist" id="conv-funil">
          <div class="empty-state"><span class="spinner"></span></div>
        </div>
      </div>

      <div class="chart-card" style="flex:1; min-width:300px;">
        <div class="chart-card-header">
          <div class="chart-title">Por status de assinatura</div>
        </div>
        <div class="barlist" id="conv-status">
          <div class="empty-state"><span class="spinner"></span></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="../assets/js/waves-bg.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/icons.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/app-shell.js"></script>
<script src="../assets/js/admin-conversoes.js"></script>

</body>
</html>
